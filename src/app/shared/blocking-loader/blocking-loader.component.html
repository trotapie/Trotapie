@if (open) {
  <div
    class="fixed inset-0 z-[3500] flex items-center justify-center px-4"
    [ngClass]="showBackdrop ? 'bg-black/50 backdrop-blur-[2px]' : ''"
    role="dialog"
    aria-modal="true"
    aria-live="polite"
  >
    <div class="w-full max-w-sm rounded-2xl bg-white p-6 shadow-2xl">
      <div class="flex flex-col items-center gap-3 text-center">
        <mat-progress-spinner diameter="44" mode="indeterminate"></mat-progress-spinner>
        <p class="text-base font-semibold text-gray-900">{{ title }}</p>
        <p class="text-sm text-gray-600">{{ message }}</p>
      </div>
    </div>
  </div>
}
