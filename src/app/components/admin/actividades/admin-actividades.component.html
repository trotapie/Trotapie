<div class="flex min-w-0 flex-auto flex-col bg-gray-50">
    <div class="mx-auto flex w-full max-w-screen-xl flex-col px-6 py-8 sm:px-8">
        <div class="max-w-2xl">
            <h1 class="text-3xl font-bold tracking-tight text-gray-900 dark:text-white">
                Catalogos
            </h1>
            <p class="mt-2 text-base text-gray-500">
                Administra los catalogos disponibles para mantener organizada la informacion del sistema.
            </p>
        </div>
    </div>

    <div class="mx-auto w-full max-w-screen-xl px-6 py-8 sm:px-8">
        <div class="grid grid-cols-1 gap-6 sm:grid-cols-2 xl:grid-cols-4">
            @for (item of catalogos; track item.titulo) {
            <a [routerLink]="[item.link]"
                class="group relative flex cursor-pointer flex-col overflow-hidden rounded-2xl border border-gray-200 bg-white shadow-sm transition-all duration-300 hover:-translate-y-1 hover:shadow-xl">
                <div class="relative aspect-[16/9] w-full overflow-hidden">
                    <img [src]="item.imagen" [alt]="item.titulo" class="h-full w-full object-cover transition-transform duration-500 group-hover:scale-105" />
                    <div class="absolute inset-0 bg-gradient-to-t from-black/40 via-black/10 to-transparent"></div>
                    <div class="absolute left-4 top-4 flex h-10 w-10 items-center justify-center rounded-xl bg-white/85 text-gray-800 shadow-md backdrop-blur-sm">
                        <mat-icon class="icon-size-5" [svgIcon]="item.icono"></mat-icon>
                    </div>
                </div>

                <div class="relative z-10 flex flex-1 flex-col p-6">
                    <h2 class="text-2xl font-bold text-gray-900">
                        {{ item.titulo }}
                    </h2>

                    <p class="mt-2 flex-1 text-base leading-6 text-gray-500">
                        {{ item.descripcion }}
                    </p>
                </div>
            </a>
            }
        </div>
    </div>
</div>
