<div class="mx-auto flex w-full max-w-screen-xl flex-col px-4 py-8 sm:px-6">
    <div class="mb-8 text-center">
        <h1 class="text-4xl font-bold text-gray-900 dark:text-white">Circuitos</h1>
        <p class="mt-2 text-lg text-gray-600 dark:text-gray-400">Paquetes completos con todo incluido</p>
    </div>

    @if (cargando) {
    <div class="flex h-40 items-center justify-center">
        <mat-progress-spinner diameter="36" mode="indeterminate"></mat-progress-spinner>
    </div>
    } @else if (error) {
    <div class="rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-center text-sm text-red-700">
        {{ error }}
    </div>
    } @else if (!circuitos.length) {
    <div class="py-16 text-center text-gray-500">
        <p class="text-lg">Proximamente...</p>
        <p class="mt-1 text-sm">Estamos preparando circuitos increibles para ti.</p>
    </div>
    } @else {
    <div class="grid grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-3">
        @for (circuito of circuitos; track circuito.id) {
        <button type="button" (click)="irADetalle(circuito)"
            class="group overflow-hidden rounded-2xl border border-gray-200 bg-white text-left shadow-sm transition-all hover:shadow-lg dark:border-gray-700 dark:bg-gray-800">
            @if (circuito.imagen_principal) {
            <div class="aspect-[16/9] overflow-hidden">
                <img [src]="circuito.imagen_principal" [alt]="circuito.nombre"
                    class="h-full w-full object-cover transition-transform group-hover:scale-105" />
            </div>
            } @else {
            <div class="flex aspect-[16/9] items-center justify-center bg-gray-100 dark:bg-gray-700">
                <mat-icon class="icon-size-12 text-gray-400" [svgIcon]="'heroicons_outline:map'"></mat-icon>
            </div>
            }
            <div class="p-4">
                <h3 class="text-lg font-semibold text-gray-900 dark:text-white">{{ circuito.nombre }}</h3>
                @if (circuito.descripcion) {
                <p class="mt-1 line-clamp-2 text-sm text-gray-600 dark:text-gray-400">{{ circuito.descripcion }}</p>
                }
                <div class="mt-3 flex items-center justify-between">
                    <span class="text-sm text-gray-500 dark:text-gray-400">
                        {{ circuito.duracion_dias }} días / {{ circuito.duracion_noches }} noches
                    </span>
                    <span class="text-xl font-bold text-primary-600 dark:text-primary-400">
                        {{ circuito.precio_total | currency:'MXN':'symbol-narrow':'1.0-0' }}
                    </span>
                </div>
            </div>
        </button>
        }
    </div>
    }
</div>
