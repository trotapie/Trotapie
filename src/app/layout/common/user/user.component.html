<button mat-icon-button [matMenuTriggerFor]="userActions">
    <span class="relative flex items-center justify-center">
        @if (showAvatar && user?.avatar) {
            <img class="h-8 w-8 rounded-full object-cover" [src]="user.avatar" [alt]="user.name || user.email" />
        } @else {
            <mat-icon [svgIcon]="'heroicons_outline:user-circle'"></mat-icon>
        }
        <span
            class="absolute bottom-0 right-0 h-2 w-2 rounded-full"
            [ngClass]="{
                'mb-px mr-px': !showAvatar || !user?.avatar,
                'bg-green-500': user?.status === 'online',
                'bg-amber-500': user?.status === 'away',
                'bg-red-500': user?.status === 'busy',
                'bg-gray-400': user?.status === 'not-visible',
            }"
        ></span>
    </span>
</button>

<mat-menu [xPosition]="'before'" #userActions="matMenu">
    <button mat-menu-item>
        <span class="flex flex-col leading-none">
            <span class="text-xs uppercase tracking-wide text-secondary">Sesión iniciada como</span>
            <span class="mt-1.5 text-md font-medium">{{ user?.name || user?.email || 'Usuario' }}</span>
            <span class="text-sm text-secondary">{{ user?.email }}</span>
        </span>
    </button>
    <mat-divider class="my-2"></mat-divider>
    <button mat-menu-item (click)="signOut()">
        <mat-icon [svgIcon]="'heroicons_outline:arrow-right-on-rectangle'"></mat-icon>
        <span>Cerrar sesión</span>
    </button>
</mat-menu>
