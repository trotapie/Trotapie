        <div class="w-full overflow-auto">
            <table mat-table [dataSource]="dataSource" cdkDropList [cdkDropListData]="dataSource"
                (cdkDropListDropped)="drop($event)">

                <ng-container matColumnDef="orden">
                    <th mat-header-cell *matHeaderCellDef>Orden</th>
                    <td mat-cell *matCellDef="let item; let i = index">
                        {{ i + 1 }}
                    </td>
                </ng-container>

                <ng-container matColumnDef="destino">
                    <th mat-header-cell *matHeaderCellDef>Destino</th>
                    <td mat-cell *matCellDef="let item">
                        {{ item.destino }}@if(item.destino_padre){, {{ item.destino_padre}}}
                    </td>
                </ng-container>

                <ng-container matColumnDef="tipoDestino">
                    <th mat-header-cell *matHeaderCellDef>Tipo Destino</th>
                    <td mat-cell *matCellDef="let item">
                        {{ item.tipo_destino }}
                    </td>
                </ng-container>

                <ng-container matColumnDef="acciones">
                    <th mat-header-cell *matHeaderCellDef>Acciones</th>
                    <td mat-cell *matCellDef="let item">
                        <mat-icon cdkDragHandle class="cursor-move">
                            drag_indicator
                        </mat-icon>
                    </td>
                </ng-container>

                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

                <tr mat-row cdkDrag *matRowDef="let row; columns: displayedColumns">
                </tr>

            </table>
        </div>
