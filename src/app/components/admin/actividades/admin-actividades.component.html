<div class="flex min-w-0 flex-auto flex-col bg-gray-50">
    <div class="mx-auto flex w-full max-w-screen-xl flex-col px-6 py-8 sm:px-8">
        <div class="max-w-2xl">
            <h1 class="text-3xl font-bold tracking-tight text-gray-900">
                Catalogos
            </h1>
            <p class="mt-2 text-base text-gray-500">
                Administra los catalogos disponibles para mantener organizada la informacion del sistema.
            </p>
        </div>
    </div>

    <div class="mx-auto w-full max-w-screen-xl px-6 py-8 sm:px-8">
        <div class="grid grid-cols-1 gap-6 sm:grid-cols-2 xl:grid-cols-3">
            @for (item of catalogos; track item.titulo) {
            <a [routerLink]="[item.link]"
                class="group relative flex cursor-pointer flex-col overflow-hidden rounded-2xl border border-gray-200 bg-white shadow-sm transition-all duration-300 hover:-translate-y-1 hover:shadow-xl">
                <div
                    class="relative aspect-[16/9] w-full overflow-hidden bg-gradient-to-br from-emerald-100 via-teal-100 to-cyan-100">
                    <div class="absolute -right-10 -top-10 h-36 w-36 rounded-full bg-white/60 blur-2xl"></div>
                    <div class="absolute -bottom-10 -left-10 h-36 w-36 rounded-full bg-emerald-200/70 blur-2xl"></div>
                    <div class="relative flex h-full items-center justify-center">
                        <mat-icon class="icon-size-14 text-emerald-800" [svgIcon]="item.icono"></mat-icon>
                    </div>
                </div>

                <div class="relative z-10 -mt-12 flex flex-1 flex-col p-6">
                    <div
                        class="mb-5 flex h-16 w-16 items-center justify-center rounded-2xl bg-white text-gray-700 shadow-lg transition-colors duration-300 group-hover:text-white">
                        <mat-icon class="icon-size-8" [svgIcon]="item.icono"></mat-icon>
                    </div>

                    <h2 class="text-2xl font-bold text-gray-900">
                        {{ item.titulo }}
                    </h2>

                    <p class="mt-2 flex-1 text-base leading-6 text-gray-500">
                        {{ item.descripcion }}
                    </p>
                </div>
            </a>
            }
        </div>
    </div>
</div>
